<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Hub de Proyectos</title>
    <link <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Mi Portafolio Dev</h1>
        <nav>
            <ul>
                <li><a href="#proyectos">Proyectos</a></li>
                <li><a href="#foro">Foro</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="proyectos">
            <h2>Mis Aplicaciones</h2>
            <div class="grid-proyectos" id="lista-proyectos">
                </div>
        </section>

        <hr>

        <section id="foro">
            <h2>Foro de la Comunidad</h2>
            <div id="mensajes-foro" class="caja-mensajes">
                </div>
            
            <div class="controles-foro">
                <input type="text" id="nombre-usuario" placeholder="Tu nombre">
                <input type="text" id="texto-mensaje" placeholder="Escribe un mensaje...">
                <button onclick="enviarMensaje()">Enviar</button>
            </div>
        </section>
    </main>

    <script type="module" src="js/script.js"></script>
</body>
</html>
